<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Push May 26 Bulls outings</title>
<style>
body{font-family:Arial,sans-serif;background:#0d1b2a;color:#e2ddd4;padding:20px;max-width:680px;margin:auto;}
h1{color:#c8a96e;}
.note{background:rgba(200,169,110,.10);color:#c8a96e;padding:10px;border-radius:4px;font-size:12px;margin-bottom:14px;line-height:1.5;}
table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px;font-family:monospace;}
th,td{padding:4px 8px;border:1px solid rgba(255,255,255,.10);text-align:left;}
th{background:rgba(200,169,110,.10);color:#c8a96e;font-size:11px;}
td.num{text-align:right;}
button{background:#c8a96e;color:#000;border:none;padding:12px 22px;border-radius:4px;font-weight:bold;cursor:pointer;font-size:14px;}
button:disabled{opacity:.5;cursor:not-allowed;}
#status{margin-top:14px;padding:10px;border-radius:4px;font-size:13px;white-space:pre-wrap;font-family:monospace;}
.ok{background:rgba(42,125,82,.20);color:#36a066;}
.err{background:rgba(184,50,40,.20);color:#e04535;}
.warn{background:rgba(200,169,110,.20);color:#c8a96e;}
</style>
</head>
<body>
<h1>Push May 26 — Bulls pitching</h1>

<div class="note">
Bulls @ Grasshoppers (W 6-3) on 2026-05-26. Standings already updated. Just pushing the 2 pitching outings + bumping Bulls season totals so the v211 diagnostic stays clean (no red ⚠).
</div>

<table>
<thead><tr><th>Date</th><th>Pitcher</th><th class="num">PT</th></tr></thead>
<tbody>
<tr><td>2026-05-26</td><td>William Burke</td><td class="num">70</td></tr>
<tr><td>2026-05-26</td><td>William Agnew</td><td class="num">49</td></tr>
</tbody>
</table>

<button id="push-btn" onclick="doPush()">Push 2 outings → Firestore</button>
<div id="status"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCc3otq-H3V9-Y9IHwAU9WOUzbdE_CNR2A",
  authDomain: "diamond-statz.firebaseapp.com",
  projectId: "diamond-statz",
  storageBucket: "diamond-statz.firebasestorage.app",
  messagingSenderId: "1012444904664",
  appId: "1:1012444904664:web:9ace26fb1dd7801243abad"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const OUTINGS=[
  {date:'2026-05-26', name:'William Burke', pitches:70},
  {date:'2026-05-26', name:'William Agnew', pitches:49}
];
const BULLS_SEASON_DELTA={
  'William Burke':{pt:70,gp:1},
  'William Agnew':{pt:49,gp:1}
};

async function doPush(){
  const btn=document.getElementById('push-btn');
  const status=document.getElementById('status');
  status.className='';status.textContent='';btn.disabled=true;
  try{
    if(!confirm('Push Bulls Burke (70p) + Agnew (49p) for 2026-05-26?')){btn.disabled=false;return;}
    status.className='warn';status.textContent='Reading oppPitcherLog…';
    const snap=await db.collection('appdata').doc('oppPitcherLog').get();
    const doc=snap.exists?(snap.data()||{}):{};
    const teams=doc.teams||{};
    const bulls=teams['Bulls']||{pitchers:{}};
    if(!bulls.pitchers)bulls.pitchers={};
    let added=0,replaced=0;
    OUTINGS.forEach(o=>{
      const p=bulls.pitchers[o.name]||{outings:[],jersey:''};
      const before=(p.outings||[]).length;
      p.outings=(p.outings||[]).filter(x=>x.date!==o.date);
      const after=p.outings.length;
      if(after<before)replaced++;else added++;
      p.outings.push({date:o.date,pitches:o.pitches,ip:0});
      p.outings.sort((a,b)=>a.date.localeCompare(b.date));
      bulls.pitchers[o.name]=p;
    });
    // Bump season totals for these two so the v211 diagnostic stays green
    if(!bulls.seasonTotals)bulls.seasonTotals={pitchers:{}};
    if(!bulls.seasonTotals.pitchers)bulls.seasonTotals.pitchers={};
    Object.keys(BULLS_SEASON_DELTA).forEach(name=>{
      const d=BULLS_SEASON_DELTA[name];
      const cur=bulls.seasonTotals.pitchers[name]||{pt:0,gp:0,gs:0};
      bulls.seasonTotals.pitchers[name]={pt:(cur.pt||0)+d.pt,gp:(cur.gp||0)+d.gp,gs:cur.gs||0};
    });
    bulls.seasonTotals.updated=new Date().toISOString();
    bulls.updated=new Date().toISOString();
    teams['Bulls']=bulls;

    status.textContent='Writing oppPitcherLog…';
    await db.collection('appdata').doc('oppPitcherLog').set({teams:teams,updated:new Date()},{merge:false});

    // Verify
    const verify=await db.collection('appdata').doc('oppPitcherLog').get();
    const vBulls=(verify.data().teams||{})['Bulls']||{};
    const vp=vBulls.pitchers||{};
    const burkeOut=(vp['William Burke']||{}).outings||[];
    const agnewOut=(vp['William Agnew']||{}).outings||[];
    const burkePt=burkeOut.reduce((s,o)=>s+(o.pitches||0),0);
    const agnewPt=agnewOut.reduce((s,o)=>s+(o.pitches||0),0);
    const ssn=(vBulls.seasonTotals||{}).pitchers||{};
    const burkeSsn=ssn['William Burke']||{};
    const agnewSsn=ssn['William Agnew']||{};

    status.className='ok';
    status.textContent='✓ Pushed.\n\n'+added+' new, '+replaced+' replaced\n\n'
      +'William Burke: outings '+burkePt+'/'+burkeOut.length+' vs season '+(burkeSsn.pt||'-')+'/'+(burkeSsn.gp||'-')+(burkePt===burkeSsn.pt&&burkeOut.length===burkeSsn.gp?' ✓':' ✗')+'\n'
      +'William Agnew: outings '+agnewPt+'/'+agnewOut.length+' vs season '+(agnewSsn.pt||'-')+'/'+(agnewSsn.gp||'-')+(agnewPt===agnewSsn.pt&&agnewOut.length===agnewSsn.gp?' ✓':' ✗');
  }catch(e){
    status.className='err';
    status.textContent='Error: '+e.message;
  }
  btn.disabled=false;
}
</script>
</body>
</html>
